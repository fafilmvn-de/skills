<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{TITLE}}</title>
<style>
  :root { --ink:#0f172a; --muted:#475569; --line:#e2e8f0; --accent:#0052cc; --accent-2:#0747a6; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#f1f5f9;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}
  header{background:linear-gradient(135deg,#0747a6,#0052cc);color:#fff;padding:24px 32px;
    box-shadow:0 2px 8px rgba(0,0,0,.15)}
  header h1{margin:0;font-size:24px;font-weight:600}
  header .meta{opacity:.85;font-size:13px;margin-top:8px}
  header .meta a{color:#cfe1ff}
  main{max-width:920px;margin:24px auto;padding:32px;background:#fff;border:1px solid var(--line);border-radius:10px}
  main h1,main h2,main h3,main h4{color:var(--accent-2);margin-top:1.5em}
  main h2{border-bottom:1px solid var(--line);padding-bottom:6px}
  main img,main img.shot{max-width:100%;border:1px solid var(--line);border-radius:6px;margin:10px 0;
    box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:zoom-in}
  main code{background:#eef2f7;padding:1.5px 6px;border-radius:4px;font-size:.92em;
    font-family:"SF Mono",Consolas,Menlo,monospace}
  main pre{background:#0b1020;color:#e2e8f0;padding:14px 18px;border-radius:6px;overflow-x:auto}
  main pre code{background:none;color:inherit;padding:0}
  main table{border-collapse:collapse;margin:12px 0;width:100%}
  main th,main td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  main th{background:#f1f5f9}
  main blockquote{border-left:4px solid var(--accent);background:#eef5ff;padding:8px 14px;margin:10px 0;border-radius:4px}
  main a{color:var(--accent);text-decoration:none}
  main a:hover{text-decoration:underline}
  footer{max-width:920px;margin:0 auto;padding:16px 32px 40px;color:var(--muted);font-size:13px}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:99;cursor:zoom-out}
  .lb.on{display:flex}
  .lb img{max-width:95vw;max-height:95vh;border-radius:6px}
  @media print{header{background:#fff;color:#000}main{border:none;padding:0}}
</style>
</head>
<body>

<header>
  <h1>{{TITLE}}</h1>
  <div class="meta">
    <strong>Path:</strong> {{ANCESTORS}}<br>
    <strong>Source:</strong> <a href="{{URL}}" target="_blank" rel="noopener">{{URL}}</a> ·
    <strong>Last modified:</strong> {{LAST_MODIFIED}} ·
    <strong>Synced:</strong> {{SYNCED}}
  </div>
</header>

<main>
{{BODY}}
</main>

<footer>
  Mirrored from Confluence by <code>skills/atlassian-sync</code>. This is a local copy — for canonical content, see
  <a href="{{URL}}">the original page</a>.
</footer>

<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lbimg" alt=""></div>

<script>
  const lb = document.getElementById('lb'), lbimg = document.getElementById('lbimg');
  document.querySelectorAll('main img').forEach(img => {
    img.addEventListener('click', () => { lbimg.src = img.src; lb.classList.add('on'); });
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('on'); });
</script>
</body>
</html>
